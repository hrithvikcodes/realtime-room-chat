name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: chat_test
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/chat_test
        run: uv run alembic upgrade head
      
      

      - name: Run pytests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/chat_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          IMAGEKIT_PUBLIC_KEY: public_test_key
          IMAGEKIT_PRIVATE_KEY: private_test_key
          URL_ENDPOINT: https://ik.imagekit.io/test
          GOOGLE_API_KEY: test_google_key
        run: uv run pytest tests/ -v 